services:
  ollama:
    image: docker.io/ollama/ollama:rocm
    container_name: family-agent-ollama
    ports:
      - "11434:11434"
    devices:
      - /dev/kfd
      - /dev/dri
    security_opt:
      - label=disable
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: family-agent-app
    depends_on:
      - ollama
    env_file:
      - .env
    volumes:
      - ./memory:/app/memory:Z
      - ./data/lancedb:/app/data/lancedb:Z
      - ./runtime-secrets:/run/secrets:ro,Z
      - ./state:/app/state:Z
    ports:
      - "3000:3000"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  ollama-data:
