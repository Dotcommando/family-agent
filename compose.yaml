services:
  ollama:
    image: docker.io/ollama/ollama:rocm
    container_name: family-agent-ollama
    env_file:
      - .env
    ports:
      - "11434:11434"
    devices:
      - /dev/kfd
      - /dev/dri
    security_opt:
      - label=disable
    command:
      - sh
      - -lc
      - |
        ollama serve &
        pid=$!
        until ollama list >/dev/null 2>&1; do
          sleep 1
        done
        ollama pull "$OLLAMA_MODEL"
        wait "$pid"
    healthcheck:
      test: ["CMD-SHELL", "ollama show $$OLLAMA_MODEL >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 10s
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: family-agent-app
    depends_on:
      - ollama
    env_file:
      - .env
    volumes:
      - ./memory:/app/memory:Z
      - ./data/lancedb:/app/data/lancedb:Z
      - ./runtime-secrets:/run/secrets:ro,Z
      - ./state:/app/state:Z
    ports:
      - "3000:3000"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  ollama-data:
