services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: family-agent-app
    network_mode: host
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://127.0.0.1:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:14b}
    volumes:
      - ./memory:/app/memory:Z
      - ./data/lancedb:/app/data/lancedb:Z
      - ./runtime-secrets:/run/secrets:ro,Z
      - ./state:/app/state:Z
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
